name: Website Deployment
on: 
  push: 
    branches: 
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    steps: 
      - name: Get code 
        uses: actions/checkout@v6
      - name: Cache dependencies 
        id: cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-dep-module-${{ hashFiles('**/package-lock.json') }}
      - name: Install depedencies
        if: steps.cache.outputs.cache_hit != 'true'
        run: npm ci
      - name: lint code 
        run: npm run lint
  test:
    runs-on: ubuntu-latest 
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Cache dependencies 
        id: cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-dep-module-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run test 
        id: run-tests
        run: npm run test 
      - name: Upload test report 
        if: failure() && steps.run-tests.outcome == 'failure' 
        uses: actions/upload-artifact@v7 
        with:
          name: test-report
          path: test.json 
  build:
    needs: test 
    runs-on: ubuntu-latest 
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Cache dependencies 
        id: cache
        uses: actions/cache@v5 
        with: 
          path: node_modules 
          key: node-dep-module-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies 
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci 
      - name: Buld web
        run: npm run build 
      - name: Upload artifact 
        uses: actions/upload-artifact@v7 
        with: 
          name: dist-files 
          path: dist 
  deploy:
    needs: build
    runs-on: ubuntu-latest 
    steps: 
      - name: Get build artifacts
        uses: actions/download-artifact@v7 
        with:
          name: dist-files 
      - name: output contents 
        run: ls
      - name: Deploy 
        run: echo "Deploying.."

  report:
    needs: [lint, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |
          echo "${{ toJSON(github) }}"
          echo "Something went wrong"